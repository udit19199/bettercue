<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>PromptPilot</title>
    <style>
      body{font-family:Inter,system-ui,Segoe UI,Arial;margin:0;padding:12px;width:360px}
      header{display:flex;align-items:center;gap:8px}
      h1{font-size:16px;margin:0}
      textarea{width:100%;height:120px;margin-top:8px}
      select,button{margin-top:8px}
      #preview{white-space:pre-wrap;background:#f7f7fb;padding:8px;border-radius:6px;margin-top:8px}
    </style>
  </head>
  <body>
    <header>
      <div style="width:36px;height:36px;background:linear-gradient(135deg,#6ee7b7,#60a5fa);border-radius:8px"></div>
      <h1>PromptPilot</h1>
    </header>
    <div>
      <label>Prompt</label>
      <textarea id="prompt" placeholder="Paste or type your prompt"></textarea>

      <div>
        <label>Provider</label>
        <select id="provider">
          <option value="mock">Mock</option>
          <option value="openai">OpenAI</option>
        </select>
        <label>Model</label>
        <input id="model" value="gpt-4o" />
      </div>

      <button id="optimize">Optimize</button>

      <div id="preview"></div>
      <div style="display:flex;gap:8px;margin-top:8px">
        <button id="copy">Copy</button>
        <button id="replace">Replace Selection</button>
      </div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
